name: Build N64 ROM

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dragonminded/libdragon:latest

    env:
      N64_INST: /n64_toolchain
      LIBDRAGON_COMMIT: c60bfbfc2c44b86e3627b06640b0260b89788118

    steps:
      - uses: actions/checkout@v6

      - name: Cache libdragon build
        id: cache-libdragon
        uses: actions/cache@v5
        with:
          path: /n64_toolchain
          key: libdragon-${{ env.LIBDRAGON_COMMIT }}

      - name: Build libdragon (preview)
        if: steps.cache-libdragon.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/DragonMinded/libdragon.git /tmp/libdragon
          cd /tmp/libdragon
          git checkout $LIBDRAGON_COMMIT
          ./build.sh $N64_INST

      - name: Build ROM
        run: make all

      - name: Upload ROM
        uses: actions/upload-artifact@v7
        with:
          name: n64-hardware-test
          path: n64_hardware_test.z64
